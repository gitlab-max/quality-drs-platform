<!DOCTYPE html>
<html>
<head>

<title>Project</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>

{{ project['name'] }}

</h1>

<a href="/">
Dashboard
</a>

<hr>

{% if project['mode'] == 'csv' %}

<div class="card">

<h2>
Upload Historical CSV
</h2>

<form
action="/upload/{{ project['id'] }}"
method="POST"
enctype="multipart/form-data">

<input
type="file"
name="csvfile"
required>

<button>

Generate DRS

</button>

</form>

</div>

{% endif %}

{% if project['mode'] == 'manual' %}

<div class="card">

<h2>

Manual Project

</h2>

<p>

Add parameters first.

Then analyze samples.

</p>

<a
href="/parameters/{{ project['id'] }}">

Manage Parameters

</a>

<br><br>

<a
href="/analyze/{{ project['id'] }}">

Analyze Samples

</a>

</div>

{% endif %}

</div>

</body>
</html>
