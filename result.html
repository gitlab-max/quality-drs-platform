<!DOCTYPE html>
<html>
<head>

<title>Result</title>

<link rel="stylesheet"
href="{{ url_for('static',
filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Analysis Result</h1>

<div class="card">

<h2>

Prediction:

{{ result.prediction }}

</h2>

<h2>

DRS Score:

{{ result.drs_score }}

</h2>

<hr>

<h3>Assessment</h3>

<ul>

{% for k,v in result.assessment.items() %}

<li>

{{ k }}

=

{{ v }}

</li>

{% endfor %}

</ul>

</div>

<a href="/download_json">

Download JSON

</a>

<br><br>

<a href="/analyze/{{ project_id }}">

Analyze Another Sample

</a>

</div>

</body>
</html>
